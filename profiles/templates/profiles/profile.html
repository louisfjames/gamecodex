{% extends 'base.html' %}
{% block content %}
<section class="text-center my-5">
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center pb-2 mb-3">
            <h2>{{ user.username }}'s Profile</h2>
            <div class="d-flex flex-column flex-md-row align-items-end gap-2">
                <a href="#">See All Entries</a>
                <a href="#">Edit Entries</a>
            </div>
        </div>

        <div class="row row-cols-2 row-cols-md-4 text-center mb-4 g-3">
            <div class="col">
                <span class="fw-bold">Currently Playing:</span> X
            </div>
            <div class="col">
                <span class="fw-bold">Games Completed:</span> X
            </div>
            <div class="col">
                <span class="fw-bold">Gaming Backlog:</span> X
            </div>
            <div class="col">
                <span class="fw-bold">Games Abandoned:</span> X
            </div>
        </div>
    </div>
</section>
{% endblock %}
