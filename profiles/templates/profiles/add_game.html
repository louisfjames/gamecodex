{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-center align-items-center p-5">
    <div class="glass-card p-4">

        <div class="row">

            <div class="pb-5">
                <h2 class="text-center mb-4">Add Game to Your List</h2>
            </div>
            
            <div class="col-md-4 d-flex justify-content-center align-items-start"> 
                {% if cover_id %}
                    <img src="https://images.igdb.com/igdb/image/upload/t_cover_big/{{ cover_id }}.jpg" alt="Game cover" class="img-fluid mb-3">
                {% endif %}
            </div>

            <div class="col-md-8">
                <form method="post" class="form-center">
                    {% csrf_token %}

                    <div class="form-row">
                        <label class="form-label">Title:</label>
                        {{ form.title }}
                    </div>

                    <div class="form-row">
                        <label class="form-label">Platform:</label>
                        {{ form.platform }}
                    </div>

                    {% if summary %}
                        <div class="form-row pb-4">
                            <label class="form-label">Description:</label>
                            {{ summary }}
                        </div>
                    {% endif %}

                    <div class="form-row">
                        <label class="form-label">Status:</label>
                        {{ form.status }}
                    </div>

                    <div class="form-row">
                        <label class="form-label">Date started:</label>
                        {{ form.date_started }}
                    </div>

                    <div class="form-row">
                        <label class="form-label">Date completed:</label>
                        {{ form.date_completed }}
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'search' %}" class="btn btn-secondary">Back</a>
                        <button type="submit" class="btn btn-success">Save</button>
                    </div>
                
                </form>
            
            </div>
        
        </div> 

    </div>

</div>
{% endblock %}
