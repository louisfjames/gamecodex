<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO meta description -->

    <title>{% block title %}GameCodex{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <!-- favicons generated by favicon.io -->

    <!-- custom CSS -->
    <link rel="stylesheet" href="#">

</head>
<body>
    <!-- Navigation - using Boostrap -->
    <header>
        <nav id="navbar" class="navbar navbar-expand-lg mb-4" data-bs-theme="light">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'home' %}">GameCodex</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        {% if user.is_authenticated %}
                            <li class="nav-item">
                                <a class="nav-link" href="#">Search</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Profile</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Logout</a>
                            </li>
                        {% else %}
                            <li class="nav-item">
                                <a class="nav-link" href="#">Login</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Register</a>
                            </li>
                        {% endif %}
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>   
    
    <footer class="mt-auto text-center py-4 footer-top-border">
        <div class="container" style="max-width: 600px;">
            <div class="d-flex flex-column flex-md-row justify-content-center align-items-center gap-5">
                <!-- Footer Links -->
                <div class="d-flex gap-5">
                    <a href="#" class="footer-text">About</a>
                    <a href="#" class="footer-text">FAQs</a>
                    <a href="#" class="footer-text">Contact</a>
                    <a href="#" class="footer-text">Support</a>
                </div>
                <!-- Social media icons -->
                <div class="d-flex justify-content-center gap-5">
                    <a href="https://www.instagram.com/" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                    <a href="https://www.tiktok.com/" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
                    <a href="https://www.twitch.tv/" aria-label="Twitch"><i class="fa-brands fa-twitch"></i></a>
                    <a href="https://www.youtube.com/" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
                </div>
            </div>
            <!-- Copyright -->
            <div class="footer-text mt-3">
                © 2026 GameCodex
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

     <!-- Font Awesome kit -->
    <script src="https://kit.fontawesome.com/9e82e4ab0b.js" crossorigin="anonymous"></script>

</body>
</html>
